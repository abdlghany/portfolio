<script>
function playVideo(el) {
  const wrapper = el.parentElement;
  const iframe = wrapper.querySelector("iframe");

  iframe.contentWindow.postMessage(
    JSON.stringify({
      event: "command",
      func: "playVideo",
      args: []
    }),
    "*"
  );

  el.remove();
}
</script>
